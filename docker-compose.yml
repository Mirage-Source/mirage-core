services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "127.0.0.1:5432:5432"
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_NAME:-mirage}
      POSTGRES_USER: ${DB_USER:-mirage}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-mirage} -d ${DB_NAME:-mirage}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mirage-core:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-mirage}
      DB_NAME: ${DB_NAME:-mirage}
    volumes:
      - ./config/hostkey:/app/config/hostkey:ro
    ports:
      - "22:2222"
    restart: unless-stopped

  ml-worker:
    build:
      context: .
      dockerfile: bridge/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      PYTHONUNBUFFERED: "1"
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-mirage}
      DB_NAME: ${DB_NAME:-mirage}
      BRIDGE_POLL_INTERVAL_S: "10"
      BRIDGE_BATCH_SIZE: "32"
      # MIRAGE_MODEL_CHECKPOINT: /app/artifacts/embedder/best.pt
      # MIRAGE_TOKENIZER_DIR: /app/artifacts/embedder/tokenizer
      # MIRAGE_MODEL_VERSION: mirage-emb-v1
      # Phase-4 threat-intel summaries (off by default). To enable, uncomment and
      # put ANTHROPIC_API_KEY in .env:
      # MIRAGE_INTEL_USE_LLM: "1"
      # MIRAGE_INTEL_MODEL: claude-opus-4-8
      # MIRAGE_STIX_ENABLED: "1"
    volumes:
      - ./artifacts:/app/artifacts:ro
    restart: unless-stopped

  mirage-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-mirage}
      DB_NAME: ${DB_NAME:-mirage}
      API_KEY: ${API_KEY}
    ports:
      - "127.0.0.1:8080:8080"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.51.0
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    ports:
      - "127.0.0.1:9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    depends_on:
      - prometheus
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-mirage}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s/"
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
